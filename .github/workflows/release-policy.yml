name: release-policy

on:
  pull_request:
    branches:
      - main

jobs:
  release-policy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce promotion metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $marketplace = Get-Content -Raw .github/plugin/marketplace.json | ConvertFrom-Json
          $plugin = Get-Content -Raw plugins/widget-workshop/plugin.json | ConvertFrom-Json
          $codex = Get-Content -Raw plugins/widget-workshop/.codex-plugin/plugin.json | ConvertFrom-Json
          $claude = Get-Content -Raw plugins/widget-workshop/.claude-plugin/plugin.json | ConvertFrom-Json
          $versions = @($marketplace.metadata.version, $marketplace.plugins[0].version, $plugin.version, $codex.version, $claude.version)
          if (($versions | Select-Object -Unique).Count -ne 1) { throw "Version mismatch: $($versions -join ', ')" }
          $version = $versions[0]
          if ((Get-Content -Raw CHANGELOG.md).IndexOf("## $version", [StringComparison]::Ordinal) -lt 0) { throw "CHANGELOG.md missing ## $version" }
      - name: Validate repository
        shell: pwsh
        run: ./scripts/Test-Repository.ps1