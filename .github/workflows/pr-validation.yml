name: pr-validation

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository
        shell: pwsh
        run: ./scripts/Test-Repository.ps1
      - name: Check whitespace
        shell: pwsh
        run: git diff --check